<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMS - Wireframe</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        /* Wireframe specific styles */
        .wireframe-container {
            max-width: 1280px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Navigation */
        .nav {
            border: 2px solid #000000;
            padding: 20px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .nav-logo {
            width: 50px;
            height: 50px;
            border: 2px solid #000000;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .nav-title {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .nav-actions {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        /* Tabs */
        .tabs {
            border: 2px solid #000000;
            padding: 15px;
            margin-bottom: 20px;
            display: flex;
            gap: 20px;
        }

        .tab {
            border: 2px solid #000000;
            padding: 10px 20px;
            background-color: #f5f5f5;
        }

        .tab.active {
            background-color: #d0d0d0;
        }

        /* Widget Cards */
        .widgets {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 20px;
        }

        .widget-card {
            border: 2px solid #000000;
            padding: 20px;
            min-height: 120px;
        }

        .widget-icon {
            width: 50px;
            height: 50px;
            border: 2px solid #000000;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .skeleton-text {
            background-color: #e0e0e0;
            height: 12px;
            margin-bottom: 8px;
        }

        .skeleton-text.large {
            height: 24px;
            width: 60%;
        }

        .skeleton-text.medium {
            height: 16px;
            width: 80%;
        }

        .skeleton-text.small {
            height: 12px;
            width: 50%;
        }

        /* Section */
        .section {
            border: 2px solid #000000;
            margin-bottom: 20px;
        }

        .section-header {
            border-bottom: 2px solid #000000;
            padding: 15px 20px;
            background-color: #f5f5f5;
        }

        .section-content {
            padding: 20px;
        }

        /* Sub-tabs */
        .sub-tabs {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .sub-tab {
            border: 2px solid #000000;
            padding: 8px 16px;
            background-color: #f5f5f5;
        }

        .sub-tab.active {
            background-color: #d0d0d0;
        }

        /* Form */
        .form {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .form-field {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .form-field.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            background-color: #e0e0e0;
            height: 14px;
            width: 120px;
        }

        .form-input {
            border: 2px solid #000000;
            height: 40px;
            background-color: #ffffff;
        }

        .form-textarea {
            border: 2px solid #000000;
            height: 80px;
            background-color: #ffffff;
        }

        .form-button {
            border: 2px solid #000000;
            padding: 10px 20px;
            background-color: #d0d0d0;
            width: fit-content;
        }

        /* Table */
        .table-container {
            border: 2px solid #000000;
            overflow-x: auto;
        }

        .table {
            width: 100%;
            border-collapse: collapse;
        }

        .table th,
        .table td {
            border: 1px solid #000000;
            padding: 12px;
            text-align: left;
        }

        .table th {
            background-color: #f5f5f5;
        }

        .table-cell-text {
            background-color: #e0e0e0;
            height: 12px;
            width: 80%;
        }

        /* Button */
        .button {
            border: 2px solid #000000;
            padding: 8px 16px;
            background-color: #d0d0d0;
            display: inline-block;
        }

        /* Badge */
        .badge {
            border: 2px solid #000000;
            padding: 4px 12px;
            background-color: #e0e0e0;
            display: inline-block;
            font-size: 12px;
        }

        /* Icon placeholder */
        .icon-box {
            width: 24px;
            height: 24px;
            border: 2px solid #000000;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .widgets {
                grid-template-columns: 1fr;
            }

            .form {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
