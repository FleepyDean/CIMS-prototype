<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMS Wireframe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #fff; color: #000; }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        
        /* Skeleton elements */
        .sk-line { background: #e0e0e0; height: 12px; margin-bottom: 8px; }
        .sk-line.sm { width: 40%; }
        .sk-line.md { width: 60%; height: 16px; }
        .sk-line.lg { width: 80%; height: 24px; }
        .sk-box { border: 2px solid #000; background: #fff; }
        
        /* Header */
        .header { border: 2px solid #000; padding: 20px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .logo { width: 50px; height: 50px; border: 2px solid #000; display: flex; align-items: center; justify-content: center; }
        
        /* Layout */
        .main { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        
        /* Sidebar */
        .sidebar { border: 2px solid #000; padding: 15px; }
        .sidebar-title { background: #e0e0e0; height: 10px; width: 60%; margin-bottom: 15px; }
        .nav-item { border: 2px solid #000; padding: 12px; margin-bottom: 10px; }
        .nav-item.manager { border-style: dashed; }
        .badge { border: 2px solid #000; padding: 2px 8px; float: right; background: #fff; }
        
        /* Content */
        .content { border: 2px solid #000; padding: 20px; }
        
        /* Section */
        .section { border: 2px solid #000; margin-bottom: 20px; }
        .section-header { border-bottom: 2px solid #000; padding: 15px; background: #f5f5f5; }
        
        /* Grid layouts */
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 20px; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 20px; }
        
        /* Card */
        .card { border: 2px solid #000; padding: 15px; min-height: 100px; }
        .card-icon { width: 40px; height: 40px; border: 2px solid #000; margin-bottom: 10px; }
        
        /* Form */
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .form-label { background: #e0e0e0; height: 14px; width: 100px; margin-bottom: 5px; }
        .form-input { border: 2px solid #000; height: 40px; }
        .form-textarea { border: 2px solid #000; height: 80px; }
        .btn { border: 2px solid #000; padding: 10px 20px; background: #d0d0d0; display: inline-block; margin-right: 10px; }
        
        /* Table */
        .table-wrap { border: 2px solid #000; overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        th, td { border: 1px solid #000; padding: 12px; }
        th { background: #f5f5f5; }
        .cell-line { background: #e0e0e0; height: 12px; width: 80%; }
        
        /* List items */
        .list-item { border: 2px solid #000; padding: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Grayscale shades */
        .shade-1 { background: #f5f5f5; }
        .shade-2 { background: #e0e0e0; }
        .shade-3 { background: #d0d0d0; }
        .shade-4 { background: #b0b0b0; }
        .shade-5 { background: #909090; }
        .shade-6 { background: #707070; }
        
        /* Progress bar */
        .progress { border: 2px solid #000; height: 10px; background: #fff; margin-top: 5px; }
        .progress-bar { background: #000; height: 100%; }
        
        @media (max-width: 768px) {
            .main, .grid-4, .grid-3, .grid-2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <div style="display: flex; align-items: center; gap: 15px;">
                <div class="logo">X</div>
                <div>

                    <div class="sk-line sm"></div>
                </div>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">

                </div>

            </div>
        </div>

        <!-- Main Layout -->

            <!-- Sidebar -->

                <div class="sidebar-title"></div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 70%; margin: 0;"></div>
                </div>
                
                <div class="sidebar-title"></div>
                <div class="nav-item manager">
                    <div class="sk-line" style="width: 80%; margin: 0;"></div>
                </div>
                
                <div class="sidebar-title"></div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 90%; margin: 0;"></div>
                </div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 60%; margin: 0;"></div>
                    <div class="badge">
                        <div class="sk-line" style="width: 15px; height: 8px; margin: 0;"></div>
                    </div>
                </div>
                
                <div class="sidebar-title"></div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 50%; margin: 0;"></div>
                </div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 50%; margin: 0;"></div>
                </div>
                
                <div class="sidebar-title"></div>
                <div class="nav-item">
                    <div class="sk-line" style="width: 80%; margin: 0;"></div>
                </div>
                <div class="nav-item">

                </div>
                
                <div class="sidebar-title"></div>

            <!-- Content -->

                    </div>
                    <div class="card shade-1">
                        <div class="card-icon"></div>
                        <div class="sk-line sm"></div>
                        <div class="sk-line lg"></div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="section">
                    <div class="section-header">
                        <div class="sk-line md" style="width: 150px; margin: 0;"></div>
                    </div>
                    <div style="padding: 20px;">
                        <div class="btn"></div>
                        <div class="btn"></div>
                        <div class="btn"></div>
                        <div class="btn"></div>
                    </div>
                </div>

                <!-- Procurement -->
                <div class="sk-line lg" style="margin-top: 40px;"></div>
                <div class="sk-line md" style="margin-bottom: 20px;"></div>
                
                <div class="section">
                    <div class="section-header" style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="sk-line md" style="width: 200px; margin: 0;"></div>
                        <div class="btn"></div>
                    </div>
                    <div style="padding: 20px;">
                        <div class="form-row">
                            <div>
                                <div class="form-label"></div>
                                <div class="form-input"></div>
                            </div>
                            <div>
                                <div class="form-label"></div>
                                <div class="form-input"></div>
                            </div>
                        </div>
                        <div class="form-row">
                            <div>
                                <div class="form-label"></div>
                                <div class="form-input"></div>
                            </div>
                            <div>
                                <div class="form-label"></div>
                                <div class="form-input"></div>
                            </div>
                        </div>
                        <div class="btn" style="background: #a0a0a0;"></div>
                        <div style="margin-top: 15px; padding: 10px; border: 2px dashed #000;">
                            <div class="sk-line" style="width: 200px; margin: 0;"></div>
                        </div>
                    </div>
                </div>

                <!-- Dispensing -->
                <div class="sk-line lg" style="margin-top: 40px;"></div>
                <div class="sk-line md" style="margin-bottom: 20px;"></div>
                
                <div class="grid-2">
                    <div class="section">
                        <div class="section-header">
                            <div class="sk-line md" style="width: 150px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div style="margin-bottom: 15px;">
                                <div class="form-label"></div>

                            </div>
                            <div style="margin-bottom: 15px;">
                                <div class="form-label"></div>
                                <div class="form-input"></div>

                            <div style="margin-bottom: 15px;">
                                <div class="form-label"></div>
                                <div class="form-input"></div>
                            </div>
                            <div class="btn" style="background: #505050;"></div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header shade-1">
                            <div class="sk-line md" style="width: 180px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="list-item">
                                <div class="sk-line" style="width: 150px; margin: 0;"></div>
                                <div class="btn" style="background: #a0a0a0; margin: 0;"></div>
                            </div>
                            <div class="list-item">
                                <div class="sk-line" style="width: 150px; margin: 0;"></div>
                                <div class="btn" style="background: #a0a0a0; margin: 0;"></div>
                            </div>
                            <div class="list-item shade-3">
                                <div class="sk-line" style="width: 150px; margin: 0;"></div>
                                <div class="btn" style="background: #808080; margin: 0;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Authorization -->

                    <div class="section-header shade-4">

                <!-- Expiry -->

                <div class="grid-3">
                    <div class="section">
                        <div class="section-header shade-2">
                            <div class="sk-line md" style="width: 180px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="list-item">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 100px;"></div>
                                </div>
                                <div class="btn" style="background: #606060; margin: 0;"></div>
                            </div>
                            <div class="list-item">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 100px;"></div>
                                </div>
                                <div class="btn" style="background: #606060; margin: 0;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header shade-3">
                            <div class="sk-line md" style="width: 150px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="list-item shade-3">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 100px;"></div>
                                </div>
                                <div class="btn" style="background: #808080; margin: 0;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header shade-1">
                            <div class="sk-line md" style="width: 120px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="list-item">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 100px;"></div>
                                </div>
                                <div class="sk-line" style="width: 60px; margin: 0;"></div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Restock Warning -->
                <div class="sk-line lg" style="margin-top: 40px;"></div>
                <div class="sk-line md" style="margin-bottom: 20px;"></div>
                
                <div class="grid-2">
                    <div class="section">
                        <div class="section-header shade-3">
                            <div class="sk-line md" style="width: 150px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="list-item shade-3">
                                <div>
                                    <div class="sk-line md" style="width: 150px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line" style="width: 80px; background: #d0d0d0;"></div>
                                </div>
                                <div class="btn" style="background: #808080; margin: 0;"></div>
                            </div>
                            <div class="list-item shade-2">
                                <div>
                                    <div class="sk-line md" style="width: 150px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line" style="width: 80px; background: #c0c0c0;"></div>
                                </div>
                                <div class="btn" style="background: #606060; margin: 0;"></div>
                            </div>
                        </div>
                    </div>
                    <div class="section">
                        <div class="section-header shade-6">
                            <div class="sk-line md" style="width: 180px; margin: 0;"></div>
                        </div>
                        <div style="padding: 20px;">
                            <div class="btn" style="background: #606060; margin-bottom: 15px;"></div>
                            <div class="list-item shade-6">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 180px;"></div>
                                </div>
                                <div class="badge"></div>
                            </div>
                            <div class="list-item shade-6">
                                <div>
                                    <div class="sk-line md" style="width: 120px; margin-bottom: 5px;"></div>
                                    <div class="sk-line sm" style="width: 180px;"></div>
                                </div>

                            </div>

                </div>

                <!-- Staff Directory -->

                <div class="sk-line md" style="margin-bottom: 20px;"></div>
                
                <div class="table-wrap">
                    <table>
                        <thead>

                                <th><div class="cell-line"></div></th>
                                <th><div class="cell-line"></div></th>

                                <th><div class="cell-line"></div></th>
                                <th><div class="cell-line"></div></th>
                            </tr>
                        </thead>
                        <tbody>

                                <td><div class="cell-line"></div></td>
                                <td><div class="cell-line"></div></td>

                                <td><div class="cell-line"></div></td>
                                <td><div class="btn" style="background: #a0a0a0; margin: 0;"></div></td>
                                <td><div class="btn" style="margin: 0;"></div></td>

                                <td><div class="cell-line"></div></td>
                                <td><div class="cell-line"></div></td>
                                <td><div class="cell-line"></div></td>
                                <td><div class="btn" style="background: #a0a0a0; margin: 0;"></div></td>
                                <td><div class="btn" style="margin: 0;"></div></td>
                            </tr>
                            <tr>
                                <td><div class="cell-line"></div></td>

                                <td><div class="cell-line"></div></td>

                            <tr>

</body>
</html>
