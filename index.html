<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CIMS - Clinic Inventory Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body class="bg-gray-50 font-['Inter']">
    <!-- Toast Container -->
    <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-600 to-blue-800">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-blue-600 rounded-xl flex items-center justify-center mx-auto mb-4">
                    <i class="fas fa-hospital text-3xl text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900">MediTrack</h1>
                <p class="text-gray-500 text-sm">Clinic Inventory Management System</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
                    <input type="text" id="login-username" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter username">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:ring-2 focus:ring-blue-500" placeholder="Enter password">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 font-medium">
                    <i class="fas fa-sign-in-alt mr-2"></i>Login
                </button>
                <button type="button" id="forgot-password-btn" class="w-full text-blue-600 hover:text-blue-700 text-sm">
                    Forgot Password?
                </button>
            </form>
        </div>
    </div>

    <!-- Forgot Password Modal -->
    <div id="forgot-password-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-2xl p-8 w-full max-w-md">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-gray-900">Reset Password</h2>
                <button class="close-modal text-gray-400 hover:text-gray-600">
                    <i class="fas fa-times text-xl"></i>
                </button>
            </div>
            <form id="forgot-password-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                    <input type="email" class="w-full px-4 py-2 border border-gray-200 rounded-lg" placeholder="Enter your email">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                    <i class="fas fa-paper-plane mr-2"></i>Send Reset Link
                </button>
            </form>
        </div>
    </div>

    <!-- Main Dashboard -->
    <div id="main-dashboard" class="hidden min-h-screen flex">
        <!-- Sidebar -->
        <aside class="w-64 bg-slate-900 text-white flex flex-col fixed h-full">
            <div class="p-6 border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-blue-600 rounded-lg flex items-center justify-center">
                        <i class="fas fa-hospital text-xl"></i>
                    </div>
                    <div>
                        <h1 class="font-bold text-lg">MediTrack</h1>
                        <p class="text-xs text-slate-400">ICS-v15</p>
                    </div>
                </div>
            </div>
            <nav class="flex-1 px-4 py-6 space-y-1">
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition bg-slate-800" data-view="dashboard">
                    <i class="fas fa-chart-line w-5"></i><span>Dashboard</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="procurement">
                    <i class="fas fa-shopping-cart w-5"></i><span>Procurement</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="allocation">
                    <i class="fas fa-boxes w-5"></i><span>Allocation</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="expiry">
                    <i class="fas fa-clock w-5"></i><span>Expiry Tracking</span>
                </button>
                <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="disposal">
                    <i class="fas fa-trash-alt w-5"></i><span>Disposal</span>
                </button>
                    <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="authorization">
                        <i class="fas fa-lock w-5"></i><span>Auth Assets</span>
                        <span class="ml-auto bg-red-500 text-white text-xs font-bold px-2 py-0.5 rounded-full">1</span>
                    </button>
                    <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="quality">
                        <i class="fas fa-clipboard-check w-5"></i><span>Quality & Audit</span>
                    </button>
                    <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="sterilization">
                        <i class="fas fa-syringe w-5"></i><span>Asset Sterilization</span>
                    </button>
                <div class="pt-4 mt-4 border-t border-slate-800">
                    <p class="px-4 text-xs text-slate-500 uppercase mb-2">Admin</p>
                    <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="staff">
                        <i class="fas fa-users w-5"></i><span>Staff Directory</span>
                    </button>
                    <button class="nav-item w-full flex items-center gap-3 px-4 py-3 text-sm rounded-lg hover:bg-slate-800 transition" data-view="settings">
                        <i class="fas fa-cog w-5"></i><span>Settings</span>
                    </button>
                </div>
            </nav>
            <div class="p-4 border-t border-slate-800">
                <div class="flex items-center gap-3">
                    <div id="user-avatar" class="w-10 h-10 bg-blue-600 rounded-full flex items-center justify-center text-sm font-semibold">SK</div>
                    <div class="flex-1 min-w-0">
                        <p id="user-name" class="text-sm font-medium truncate">Syaeeda Khanum</p>
                        <p id="user-role-badge" class="text-xs text-slate-400 truncate">Head of Clinic</p>
                    </div>
                    <button id="logout-btn" class="text-slate-400 hover:text-white"><i class="fas fa-sign-out-alt"></i></button>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="flex-1 ml-64">
            <header class="bg-white border-b border-gray-200 px-8 py-4 sticky top-0 z-40">
                <div class="flex items-center justify-between">
                    <h2 id="page-title" class="text-xl font-semibold text-gray-900">System Dashboard</h2>
                    <div class="flex items-center gap-4">
                        <div class="relative">
                            <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                            <input type="text" placeholder="Search Inventory ID..." class="pl-10 pr-4 py-2 border border-gray-200 rounded-lg text-sm w-64">
                        </div>
                        <button class="relative p-2 text-gray-500 hover:text-gray-700">
                            <i class="fas fa-bell"></i>
                            <span class="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                        </button>
                    </div>
                </div>
            </header>
            <div id="main-content" class="p-8 fade-in">
                <!-- Content loaded dynamically -->
            </div>
        </main>
    </div>

    <script src="data.js"></script>
    <script src="views.js"></script>
    <script src="app.js"></script>
</body>
</html>
